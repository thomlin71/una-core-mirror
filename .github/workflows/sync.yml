name: Sync UNA Core from GitHub to Codeberg

on:
  schedule:
    - cron: '0 2 * * *'  # Jeden Tag um 2:00 Uhr UTC
  workflow_dispatch:  # Manueller Trigger im GitHub-Interface

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mirror repo
        uses: actions/checkout@v4
        with:
          repository: unacms/UNA
          token: ${{ secrets.GITHUB_TOKEN }}
          path: unacms-UNA

      - name: Checkout Codeberg repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.CODEBERG_REPO }}
          token: ${{ secrets.CODEBERG_TOKEN }}
          path: codeberg-UNA

      - name: Copy files
        run: |
          cp -r unacms-UNA/* codeberg-UNA/
          cd codeberg-UNA
          git config user.name "Sync Bot"
          git config user.email "bot@codeberg.org"
          git add .
          git commit -m "Auto-sync from upstream UNA GitHub"
          git push origin main

      - name: Clean up
        run: |
          rm -rf unacms-UNA codeberg-UNA
